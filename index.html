<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Plêiades</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="loader">

    <div class="loader-bg"></div>

    <div class="loader-content">

        <div id="crest-wrapper">

            <img
                id="loader-crest"
                src="assets/branding/crest.png"
                alt="Brasão">

            <div id="constellation">

                <span class="star s1"></span>
                <span class="star s2"></span>
                <span class="star s3"></span>
                <span class="star s4"></span>
                <span class="star s5"></span>
                <span class="star s6"></span>
                <span class="star s7"></span>

            </div>

        </div>

        <h1>Biblioteca de Plêiades</h1>

        <p id="loader-text">

            Organizando a estante...

        </p>

    </div>

</div>

<button id="menu-toggle">
    ☰
</button>

<aside id="sidebar">

<div class="sidebar-header">

<div class="avatar">

<img
    src="assets/branding/crest.png"
    alt="Brasão">

</div>

<div class="profile-info">

    <h2 id="profile-name">
        Miki
    </h2>

    <p id="profile-title">
        Visitante
    </p>

    <div class="xp-wrapper">

        <div class="xp-bar">

            <div id="xp-fill"></div>

        </div>

        <span id="xp-text">
            0 / 100 XP
        </span>

    </div>

</div>

<nav>

<button>

🏠 Início

</button>

<button>

🏆 Conquistas

</button>

<button>

📊 Estatísticas

</button>

<button>

⚙ Configurações

</button>

</nav>

</aside>

    <header class="hero-header">

    <div class="hero-content">

        <div class="hero-logo">

    <img
        src="assets/branding/crest.png"
        alt="Brasão Biblioteca de Plêiades"
    >

    <div>

        <h1>Biblioteca de Plêiades</h1>

        <p>Sua coleção pessoal de Light Novels</p>

    </div>

</div>

        <div id="hero-stats" class="hero-stats">

        </div>

        <input
            id="search"
            type="text"
            placeholder="🔍 Pesquisar coleção..."
        >

    </div>


    

</header>

<main
    id="collections"
    class="collections">
</main>

    <div id="modal" class="modal hidden">

    <div class="modal-content">

        <h2 id="modal-title"></h2>

        <div id="modal-body"></div>

        <div class="modal-buttons">

            <button id="modal-cancel">
                Cancelar
            </button>

            <button id="modal-confirm">
                Restaurar
            </button>

        </div>

    </div>

</div>

    <script src="js/background.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/loader.js"></script>

</body>
</html>
