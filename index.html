<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/achievements.css">
    <link rel="stylesheet" href="css/perfil.css">
    <title>Biblioteca de Plêiades</title>


</head>
<body>

<div id="loader">

    <div class="loader-bg"></div>

    <div class="loader-content">

        <div id="crest-wrapper">

            <img
                id="loader-crest"
                src="assets/branding/crest.png"
                alt="Brasão">

            <div id="constellation">

                <span class="star s1"></span>
                <span class="star s2"></span>
                <span class="star s3"></span>
                <span class="star s4"></span>
                <span class="star s5"></span>
                <span class="star s6"></span>
                <span class="star s7"></span>

            </div>

        </div>

        <h1>Biblioteca de Plêiades</h1>

        <p id="loader-text">

            Organizando a estante...

        </p>

    </div>

</div>


<div id="settings-modal" class="modal hidden">

    <div class="modal-content settings-modal">

        <h2>⚙ Configurações</h2>

        <div class="settings-group">

            <label for="profile-name-input">

                Nome do Colecionador

            </label>

            <input
                id="profile-name-input"
                type="text"
                maxlength="30"
                placeholder="Digite seu nome">

        </div>

        <div class="settings-buttons">

            <button id="settings-cancel">

                Cancelar

            </button>

            <button id="settings-save">

                Salvar

            </button>

        </div>

    </div>

</div>

<button id="menu-toggle">
    ☰
</button>

<aside id="sidebar">

<div class="avatar level1" id="profile-avatar">

    <div class="avatar-ring"></div>

    <div class="avatar-glow"></div>

    <img
        src="assets/branding/crest.png"
        alt="Brasão">

</div>

<div class="profile-card">

    <h2 id="profile-name"></h2>

    <p id="profile-title"></p>

    <span id="profile-level"></span>

    <div class="xp-wrapper">

        <div class="xp-bar">

            <div id="xp-fill"></div>

        </div>

        <span id="xp-text"></span>

    </div>

    <div class="profile-summary">

        <div class="summary-item">

            <span>📚</span>

            <div>

                <strong id="profile-collections">0</strong>

                <small>Coleções</small>

            </div>

        </div>

        <div class="summary-item">

            <span>📖</span>

            <div>

                <strong id="profile-volumes">0</strong>

                <small>Volumes</small>

            </div>

        </div>

        <div class="summary-item">

            <span>🏆</span>

            <div>

                <strong id="profile-achievements">0</strong>

                <small>Conquistas</small>

            </div>

        </div>

    </div>

</div>

<nav>

<button>

🏠 Início

</button>

<button>

🏆 Conquistas

</button>

<button>

📊 Estatísticas

</button>

<button id="settings-btn">

⚙ Configurações

</button>

</nav>

</aside>

    <header class="hero-header">

    <div class="hero-content">

        <div class="hero-logo">

    <img
        src="assets/branding/crest.png"
        alt="Brasão Biblioteca de Plêiades"
    >

    <div>

        <h1>Biblioteca de Plêiades</h1>

        <p>Sua coleção pessoal de Light Novels</p>

    </div>

</div>

        <div id="hero-stats" class="hero-stats">

        </div>

        <input
            id="search"
            type="text"
            placeholder="🔍 Pesquisar coleção..."
        >

    </div>


    

</header>

<main
    id="collections"
    class="collections">
</main>

    <div id="modal" class="modal hidden">

    <div class="modal-content">

        <h2 id="modal-title"></h2>

        <div id="modal-body"></div>

        <div class="modal-buttons">

            <button id="modal-cancel">
                Cancelar
            </button>

            <button id="modal-confirm">
                Restaurar
            </button>

        </div>

    </div>

</div>

    <script src="js/background.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/collection.js"></script>
    <script src="js/app.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/loader.js"></script>



    <div id="achievement-toast" class="achievement-toast">

    <div class="achievement-border"></div>

    <div class="achievement-glow"></div>

    <div class="achievement-icon">

        ⭐

    </div>

    <div class="achievement-content">

        <small>

            🏆 NOVA CONQUISTA

        </small>

        <h3></h3>

        <p></p>

        <span class="achievement-xp">

            +50 XP

        </span>

    </div>

</div>

</body>
</html>
